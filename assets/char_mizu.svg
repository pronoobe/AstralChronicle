<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001833"/>
      <stop offset="50%" stop-color="#0a3d6b"/>
      <stop offset="100%" stop-color="#001020"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#00bfff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#001833" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="silhouette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000d1a"/>
      <stop offset="100%" stop-color="#000810"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0066cc"/>
      <stop offset="50%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#88ddff" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="staffGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ccff"/>
      <stop offset="50%" stop-color="#0088cc"/>
      <stop offset="100%" stop-color="#005588"/>
    </linearGradient>
    <filter id="waterGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <clipPath id="borderClip">
      <rect x="0" y="0" width="200" height="280" rx="4"/>
    </clipPath>
  </defs>

  <g clip-path="url(#borderClip)">
    <!-- Background -->
    <rect width="200" height="280" fill="url(#bg)"/>
    <rect width="200" height="280" fill="url(#glow)"/>

    <!-- Water ripple background patterns -->
    <g opacity="0.15" stroke="#00aaff" fill="none" stroke-width="0.8">
      <ellipse cx="100" cy="260" rx="90" ry="12"/>
      <ellipse cx="100" cy="252" rx="80" ry="10"/>
      <ellipse cx="100" cy="245" rx="70" ry="8"/>
      <ellipse cx="100" cy="239" rx="55" ry="6"/>
    </g>

    <!-- Decorative border -->
    <rect x="4" y="4" width="192" height="272" rx="8" fill="none" stroke="#00aaff" stroke-width="1.5" stroke-opacity="0.35"/>
    <rect x="8" y="8" width="184" height="264" rx="6" fill="none" stroke="#0088cc" stroke-width="0.5" stroke-opacity="0.25"/>

    <!-- Background water aura -->
    <ellipse cx="100" cy="150" rx="60" ry="80" fill="#00aaff" opacity="0.06" filter="url(#softGlow)"/>

    <!-- Character silhouette - shrine maiden with medium hair and staff -->
    <g fill="url(#silhouette)">
      <!-- Head -->
      <ellipse cx="100" cy="72" rx="21" ry="25"/>
      <!-- Hair volume top -->
      <ellipse cx="100" cy="63" rx="25" ry="18"/>
      <!-- Hair sides - medium length -->
      <path d="M78,58 Q68,75 65,95 Q62,115 60,130 Q58,138 62,140 Q66,135 67,125 Q70,108 73,92 Q76,78 80,65Z"/>
      <path d="M122,58 Q132,75 135,95 Q138,115 140,130 Q142,138 138,140 Q134,135 133,125 Q130,108 127,92 Q124,78 120,65Z"/>
      <!-- Miko hair ornament ribbons -->
      <path d="M76,60 Q68,58 60,62 Q55,66 52,72 Q50,76 52,74 Q56,68 62,64 Q68,62 74,63Z"/>
      <path d="M124,60 Q132,58 140,62 Q145,66 148,72 Q150,76 148,74 Q144,68 138,64 Q132,62 126,63Z"/>
      <!-- Neck -->
      <rect x="93" y="94" width="14" height="12" rx="3"/>
      <!-- Miko outfit - wide sleeves -->
      <path d="M82,104 Q78,108 74,118 Q70,130 68,145 Q66,160 68,175 L132,175 Q134,160 132,145 Q130,130 126,118 Q122,108 118,104Z"/>
      <!-- Wide left sleeve -->
      <path d="M82,108 Q70,115 58,125 Q45,138 35,155 Q30,165 35,168 Q42,162 50,150 Q58,140 65,132 Q72,125 78,118Z"/>
      <!-- Wide right sleeve -->
      <path d="M118,108 Q130,115 142,125 Q155,138 165,155 Q170,165 165,168 Q158,162 150,150 Q142,140 135,132 Q128,125 122,118Z"/>
      <!-- Hakama (wide pants/skirt) -->
      <path d="M62,170 Q58,195 55,215 Q52,228 50,235 L150,235 Q148,228 145,215 Q142,195 138,170Z"/>
      <!-- Obi (belt) -->
      <rect x="68" y="168" width="64" height="10" rx="2"/>
      <!-- Feet -->
      <ellipse cx="78" cy="240" rx="12" ry="5"/>
      <ellipse cx="122" cy="240" rx="12" ry="5"/>
    </g>

    <!-- Staff -->
    <g filter="url(#waterGlow)">
      <line x1="160" y1="50" x2="155" y2="200" stroke="url(#staffGrad)" stroke-width="3" stroke-linecap="round"/>
      <!-- Staff orb -->
      <circle cx="160" cy="46" r="8" fill="#001833" stroke="#00ccff" stroke-width="1.5"/>
      <circle cx="160" cy="46" r="5" fill="#00aaff" opacity="0.6"/>
      <circle cx="160" cy="46" r="3" fill="#88ddff" opacity="0.8"/>
      <!-- Orb inner glow -->
      <circle cx="158" cy="44" r="1.5" fill="#ffffff" opacity="0.7"/>
    </g>

    <!-- Eyes glow -->
    <ellipse cx="91" cy="72" rx="3" ry="2" fill="#00ccff" opacity="0.85" filter="url(#waterGlow)"/>
    <ellipse cx="109" cy="72" rx="3" ry="2" fill="#00ccff" opacity="0.85" filter="url(#waterGlow)"/>

    <!-- Water wave accents -->
    <g filter="url(#waterGlow)" opacity="0.6">
      <!-- Flowing water around feet -->
      <path d="M30,238 Q45,232 60,236 Q75,240 90,234 Q105,228 120,234 Q135,240 150,234 Q165,228 175,235" fill="none" stroke="url(#waterGrad)" stroke-width="2"/>
      <path d="M25,245 Q40,238 58,243 Q75,248 92,240 Q110,233 128,240 Q145,247 162,240 Q178,234 185,240" fill="none" stroke="url(#waterGrad)" stroke-width="1.5" opacity="0.5"/>
    </g>

    <!-- Water droplets / bubbles -->
    <g opacity="0.5">
      <circle cx="30" cy="180" r="3" fill="none" stroke="#00aaff" stroke-width="0.8"/>
      <circle cx="28" cy="178" r="1" fill="#88ddff" opacity="0.6"/>
      <circle cx="170" cy="130" r="2.5" fill="none" stroke="#00aaff" stroke-width="0.7"/>
      <circle cx="168" cy="128" r="0.8" fill="#88ddff" opacity="0.5"/>
      <circle cx="40" cy="120" r="2" fill="none" stroke="#0088cc" stroke-width="0.6"/>
      <circle cx="175" cy="170" r="1.8" fill="none" stroke="#00aaff" stroke-width="0.6"/>
      <circle cx="25" cy="150" r="1.5" fill="none" stroke="#0088cc" stroke-width="0.5"/>
    </g>

    <!-- Floating water particles -->
    <g opacity="0.4">
      <circle cx="45" cy="100" r="1.2" fill="#00ccff">
        <animate attributeName="cy" values="100;80;65" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0.3;0" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="155" cy="90" r="1" fill="#88ddff">
        <animate attributeName="cy" values="90;70;55" dur="3.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0.2;0" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="100" cy="40" r="0.8" fill="#00aaff">
        <animate attributeName="cy" values="40;25;12" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.15;0" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Bottom panel -->
    <rect x="0" y="245" width="200" height="35" fill="#001020" fill-opacity="0.85"/>
    <line x1="20" y1="248" x2="180" y2="248" stroke="#00aaff" stroke-width="1" stroke-opacity="0.4"/>

    <!-- Character name -->
    <text x="100" y="270" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#00aaff" letter-spacing="8">水月</text>
    <text x="100" y="270" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#88ddff" letter-spacing="8" opacity="0.25">水月</text>

    <!-- Corner accents -->
    <path d="M4,20 L4,4 L20,4" fill="none" stroke="#00aaff" stroke-width="2" stroke-opacity="0.5"/>
    <path d="M180,4 L196,4 L196,20" fill="none" stroke="#00aaff" stroke-width="2" stroke-opacity="0.5"/>
    <path d="M4,260 L4,276 L20,276" fill="none" stroke="#00aaff" stroke-width="2" stroke-opacity="0.5"/>
    <path d="M180,276 L196,276 L196,260" fill="none" stroke="#00aaff" stroke-width="2" stroke-opacity="0.5"/>
  </g>
</svg>