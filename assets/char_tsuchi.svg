<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1800"/>
      <stop offset="50%" stop-color="#6b3a00"/>
      <stop offset="100%" stop-color="#1a1000"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ff8c00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2a1800" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="silhouette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0e00"/>
      <stop offset="100%" stop-color="#0d0700"/>
    </linearGradient>
    <linearGradient id="crystalGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffaa00"/>
      <stop offset="40%" stop-color="#cc7700"/>
      <stop offset="100%" stop-color="#884400"/>
    </linearGradient>
    <linearGradient id="crystalGrad2" x1="0.5" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc44"/>
      <stop offset="100%" stop-color="#996600"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc8800"/>
      <stop offset="50%" stop-color="#aa6600"/>
      <stop offset="100%" stop-color="#664400"/>
    </linearGradient>
    <filter id="earthGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="280" fill="url(#bg)"/>
  <rect width="200" height="280" fill="url(#glow)"/>

  <!-- Rock texture background elements -->
  <g opacity="0.08">
    <polygon points="0,250 20,230 40,245 30,260 5,260" fill="#cc8800"/>
    <polygon points="170,240 190,220 200,235 200,260 180,260" fill="#aa6600"/>
    <polygon points="50,260 70,245 85,258 75,270 55,270" fill="#996600"/>
    <polygon points="120,255 140,240 160,255 150,270 125,270" fill="#885500"/>
  </g>

  <!-- Decorative border -->
  <rect x="4" y="4" width="192" height="272" rx="8" fill="none" stroke="#cc8800" stroke-width="1.5" stroke-opacity="0.35"/>
  <rect x="8" y="8" width="184" height="264" rx="6" fill="none" stroke="#ffaa00" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Character silhouette - sturdy guardian with tied-back hair and shield -->
  <g fill="url(#silhouette)">
    <!-- Head -->
    <ellipse cx="100" cy="72" rx="21" ry="25"/>
    <!-- Hair tied back in a bun/ponytail -->
    <ellipse cx="100" cy="62" rx="24" ry="18"/>
    <!-- Hair bun -->
    <circle cx="100" cy="48" r="10"/>
    <!-- Hair ornament stick -->
    <line x1="90" y1="42" x2="112" y2="52" stroke="#0d0700" stroke-width="2"/>
    <!-- Side hair strands -->
    <path d="M80,62 Q74,72 72,85 Q70,92 74,90 Q76,82 78,74 Q80,68 82,64Z"/>
    <path d="M120,62 Q126,72 128,85 Q130,92 126,90 Q124,82 122,74 Q120,68 118,64Z"/>
    <!-- Neck - slightly thicker for guardian -->
    <rect x="92" y="94" width="16" height="12" rx="3"/>
    <!-- Sturdy torso with armor -->
    <path d="M78,104 Q74,110 72,122 Q70,135 68,150 Q66,165 70,178 L130,178 Q134,165 132,150 Q130,135 128,122 Q126,110 122,104Z"/>
    <!-- Shoulder armor plates -->
    <ellipse cx="72" cy="112" rx="14" ry="8"/>
    <ellipse cx="128" cy="112" rx="14" ry="8"/>
    <!-- Left arm (shield side) -->
    <path d="M68,115 Q56,120 48,130 Q42,140 38,152 Q36,160 40,160 Q44,152 48,142 Q54,132 62,124 Q66,120 70,116Z"/>
    <!-- Right arm -->
    <path d="M132,115 Q140,122 146,132 Q150,142 152,152 Q153,158 150,156 Q148,148 144,138 Q138,128 132,120Z"/>
    <!-- Armored skirt -->
    <path d="M64,175 Q60,195 58,210 Q56,222 55,232 L145,232 Q144,222 142,210 Q140,195 136,175Z"/>
    <!-- Armor plate details on skirt -->
    <path d="M72,178 L70,210 L90,210 L88,178Z" fill="#0d0700" opacity="0.5"/>
    <path d="M110,178 L112,210 L130,210 L128,178Z" fill="#0d0700" opacity="0.5"/>
    <!-- Boots -->
    <path d="M58,228 Q55,236 54,242 Q56,246 66,246 Q76,246 80,242 Q78,234 76,228Z"/>
    <path d="M124,228 Q126,236 128,242 Q126,246 136,246 Q144,246 146,242 Q144,234 142,228Z"/>
  </g>

  <!-- Large shield on left side -->
  <g filter="url(#earthGlow)">
    <path d="M25,115 L18,125 L15,160 L18,190 L25,200 L45,205 L55,198 L58,165 L55,130 L48,118Z" fill="url(#shieldGrad)" stroke="#ffaa00" stroke-width="1.5" opacity="0.85"/>
    <!-- Shield emblem -->
    <circle cx="37" cy="160" r="12" fill="none" stroke="#ffcc44" stroke-width="1.5" opacity="0.6"/>
    <polygon points="37,150 40,157 48,158 42,163 44,170 37,166 30,170 32,163 26,158 34,157" fill="#ffcc44" opacity="0.4"/>
  </g>

  <!-- Eyes glow -->
  <ellipse cx="92" cy="72" rx="3" ry="2" fill="#ffaa00" opacity="0.85" filter="url(#earthGlow)"/>
  <ellipse cx="108" cy="72" rx="3" ry="2" fill="#ffaa00" opacity="0.85" filter="url(#earthGlow)"/>

  <!-- Crystal accents -->
  <g filter="url(#earthGlow)" opacity="0.7">
    <!-- Left crystal cluster -->
    <polygon points="15,220 20,195 25,220" fill="url(#crystalGrad)"/>
    <polygon points="22,225 28,200 34,228" fill="url(#crystalGrad2)" opacity="0.8"/>
    <polygon points="10,228 14,210 18,230" fill="url(#crystalGrad)" opacity="0.6"/>
    <!-- Right crystal cluster -->
    <polygon points="170,225 175,200 180,225" fill="url(#crystalGrad)"/>
    <polygon points="178,228 184,205 190,230" fill="url(#crystalGrad2)" opacity="0.8"/>
    <polygon points="164,230 168,215 172,232" fill="url(#crystalGrad)" opacity="0.6"/>
    <!-- Small floating crystals -->
    <polygon points="165,80 168,70 171,80" fill="#ffaa00" opacity="0.5"/>
    <polygon points="30,90 33,82 36,92" fill="#cc8800" opacity="0.4"/>
  </g>

  <!-- Rock debris particles -->
  <g opacity="0.3">
    <rect x="50" cy="40" y="40" width="3" height="3" fill="#cc8800" transform="rotate(30 51 41)">
      <animate attributeName="y" values="40;55;70" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.2;0" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="150" y="35" width="2.5" height="2.5" fill="#ffaa00" transform="rotate(45 151 36)">
      <animate attributeName="y" values="35;50;65" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.15;0" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="100" y="25" width="2" height="2" fill="#996600" transform="rotate(15 101 26)">
      <animate attributeName="y" values="25;42;58" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.15;0" dur="5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Ground crack lines -->
  <g opacity="0.2" stroke="#cc8800" stroke-width="0.8" fill="none">
    <path d="M60,245 L75,240 L80,245 L95,238"/>
    <path d="M110,242 L125,238 L135,244 L148,240"/>
  </g>

  <!-- Bottom panel -->
  <rect x="0" y="245" width="200" height="35" fill="#1a1000" fill-opacity="0.85"/>
  <line x1="20" y1="248" x2="180" y2="248" stroke="#cc8800" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Character name -->
  <text x="100" y="270" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#cc8800" letter-spacing="8">岩华</text>
  <text x="100" y="270" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#ffcc44" letter-spacing="8" opacity="0.25">岩华</text>

  <!-- Corner accents -->
  <path d="M4,20 L4,4 L20,4" fill="none" stroke="#cc8800" stroke-width="2" stroke-opacity="0.5"/>
  <path d="M180,4 L196,4 L196,20" fill="none" stroke="#cc8800" stroke-width="2" stroke-opacity="0.5"/>
  <path d="M4,260 L4,276 L20,276" fill="none" stroke="#cc8800" stroke-width="2" stroke-opacity="0.5"/>
  <path d="M180,276 L196,276 L196,260" fill="none" stroke="#cc8800" stroke-width="2" stroke-opacity="0.5"/>
</svg>